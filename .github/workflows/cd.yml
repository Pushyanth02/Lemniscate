name: CD

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy-vercel:
        name: Deploy to Vercel
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            # Fetch env vars BEFORE building so VITE_* variables are available to Vite
            - name: Install Vercel CLI
              run: npm install --global vercel@latest

            - name: Pull Vercel project settings
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
              run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

            # Single build: --prod produces the final output; no separate npm run build needed
            - name: Build & deploy to Vercel (production)
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
              run: |
                  vercel build --prod --token="$VERCEL_TOKEN"
                  vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

            - name: Smoke test deployment
              run: |
                  echo "TODO: Add a smoke test (e.g. curl the deployment URL and check HTTP 200)"
                  echo "Waiting for health check placeholder — replace with actual URL probe"
                  sleep 5
                  echo "Deployment smoke test placeholder passed"
